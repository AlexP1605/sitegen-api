<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteGen Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0F;--bg2:#111118;--bg3:#1A1A24;--bg4:#22222E;
  --border:#2A2A38;--border2:#353548;
  --text:#F0F0F8;--text2:#9090A8;--text3:#5A5A72;
  --accent:#7C6FED;--accent2:#5A4FC5;--accent-glow:rgba(124,111,237,0.15);
  --success:#2ECC8A;--warning:#F0A030;--danger:#E05060;
  --radius:10px;--radius-lg:16px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:24px}
.logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-name{font-weight:600;font-size:15px}
.logo-tag{font-size:11px;color:var(--text3);margin-top:1px}
.nav{flex:1;padding:12px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--text2);transition:all .15s;margin-bottom:2px;font-size:13px}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-glow);color:var(--accent);font-weight:500}
.nav-item svg{width:18px;height:18px;opacity:.7;flex-shrink:0}
.nav-item.active svg{opacity:1}
.nav-section{font-size:11px;color:var(--text3);padding:16px 12px 6px;letter-spacing:.06em;text-transform:uppercase}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border)}
.api-mini{padding:10px 12px;background:var(--bg3);border-radius:8px;font-size:12px;color:var(--text3)}
.topbar-title{font-weight:600;font-size:15px;flex:1}
.badge-env{font-size:11px;padding:3px 8px;background:rgba(46,204,138,.1);color:var(--success);border-radius:20px;border:1px solid rgba(46,204,138,.2)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:rgba(224,80,96,.1);color:var(--danger);border:1px solid rgba(224,80,96,.2)}.btn-danger:hover{background:rgba(224,80,96,.2)}
.btn-success{background:rgba(46,204,138,.1);color:var(--success);border:1px solid rgba(46,204,138,.2)}
.btn-claude{background:#F0A030;color:#fff;border:none}.btn-claude:hover{background:#d4891f}
.btn-sm{padding:5px 10px;font-size:12px}.btn-icon{width:32px;height:32px;padding:0;justify-content:center;border-radius:7px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-label{font-size:12px;color:var(--text3);margin-bottom:8px}
.stat-value{font-size:24px;font-weight:600}
.stat-delta{font-size:12px;color:var(--success);margin-top:4px}
.gen-form{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:24px}
.form-title{font-weight:600;font-size:15px;margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
label{font-size:12px;color:var(--text2);font-weight:500}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--text3)}
textarea{resize:vertical}
.url-list{display:flex;flex-direction:column;gap:8px}
.url-item{display:flex;gap:8px;align-items:center}.url-item input{flex:1}
.add-url{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--accent);cursor:pointer;padding:6px 0;background:none;border:none;font-family:inherit}
/* Options checkboxes */
.options-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.option-card{padding:9px 10px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.option-card:hover{border-color:var(--border2)}
.option-card.selected{border-color:#F0A030;background:rgba(240,160,48,.08)}
.option-card input[type=checkbox]{width:14px;height:14px;flex-shrink:0;accent-color:#F0A030}
.option-label{font-size:12px;font-weight:500}
.option-desc{font-size:11px;color:var(--text3);margin-top:2px}
/* Progress */
.progress-bar{height:4px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:12px 0}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .5s ease}
.step-list{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.step-item{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2)}
.step-item.done{color:var(--success)}.step-item.active{color:var(--text)}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0}
.step-item.done .step-dot{background:var(--success)}
.step-item.active .step-dot{background:var(--accent);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Sites */
.sites-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.sites-header h3{font-size:15px;font-weight:600;flex:1}
.search-wrap{position:relative;flex:1;max-width:280px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);width:14px;height:14px}
.search-wrap input{padding-left:30px}
.sites-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.site-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border .15s}
.site-card:hover{border-color:var(--border2)}
.site-preview{height:130px;background:var(--bg3);position:relative;overflow:hidden;padding:12px;display:flex;flex-direction:column;gap:5px;opacity:.7}
.mock-bar{height:5px;border-radius:3px;background:var(--border2)}
.mock-bar.s{width:35%}.mock-bar.m{width:60%}.mock-bar.ac{background:var(--accent);width:28%}
.mock-row{display:flex;gap:5px}.mock-block{flex:1;height:28px;border-radius:4px;background:var(--border)}
.sdot{position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%}
.site-info{padding:14px}
.site-name{font-weight:600;font-size:14px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.site-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3);flex-wrap:wrap}
.stag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;background:var(--accent-glow);color:var(--accent)}
.site-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
/* Edit page */
.edit-layout{display:grid;grid-template-columns:1fr 380px;gap:20px;height:calc(100vh - 120px)}
.edit-left{display:flex;flex-direction:column;gap:16px;overflow-y:auto}
.edit-right{display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.section-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
/* Chat */
.chat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;flex-direction:column;height:380px}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5}
.chat-msg.user{background:var(--accent);color:#fff;align-self:flex-end;border-radius:12px 12px 4px 12px}
.chat-msg.ai{background:var(--bg3);color:var(--text);align-self:flex-start;border-radius:12px 12px 12px 4px}
.chat-msg.ai.loading{color:var(--text3)}
.chat-input-wrap{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-input-wrap input{flex:1}
/* Domain */
.domain-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.domain-status{display:flex;align-items:center;gap:8px;font-size:13px;margin-top:10px}
.dot-ok{width:8px;height:8px;border-radius:50%;background:var(--success);flex-shrink:0}
.dot-warn{width:8px;height:8px;border-radius:50%;background:var(--warning);flex-shrink:0}
/* Pricing */
.pricing-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.pricing-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.pricing-card.featured{border-color:var(--accent)}
.price-input-wrap{position:relative;margin-top:6px}
.price-input-wrap span{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.price-input-wrap input{padding-left:24px}
/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-big{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.stat-big-val{font-size:32px;font-weight:600;margin:8px 0 4px}
.stat-big-label{font-size:12px;color:var(--text3)}
.stat-big-delta{font-size:12px;color:var(--success)}
.sales-list{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.sales-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px}
.sales-row:last-child{border-bottom:none}
.sales-name{flex:1;font-weight:500}
.sales-type{font-size:11px;padding:2px 8px;border-radius:10px}
.type-onshot{background:rgba(124,111,237,.1);color:var(--accent)}
.type-abo{background:rgba(46,204,138,.1);color:var(--success)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);width:95%;max-width:1100px;max-height:95vh;display:flex;flex-direction:column}
.modal-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-weight:600;font-size:15px}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
/* Toast */
.toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:200}
.toast{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;animation:slideIn .2s ease;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast-success{background:rgba(46,204,138,.15);border:1px solid rgba(46,204,138,.3);color:var(--success)}
.toast-error{background:rgba(224,80,96,.15);border:1px solid rgba(224,80,96,.3);color:var(--danger)}
.toast-info{background:var(--accent-glow);border:1px solid rgba(124,111,237,.3);color:var(--accent)}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.divider{height:1px;background:var(--border);margin:16px 0}
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.empty h4{font-size:15px;color:var(--text2);margin-bottom:6px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
@media(max-width:900px){.edit-layout{grid-template-columns:1fr}.sidebar{display:none}.stat-grid,.stats-grid{grid-template-columns:repeat(2,1fr)}.pricing-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">
        <div class="logo-icon">⚡</div>
        <div><div class="logo-name">SiteGen</div><div class="logo-tag">Site builder AI</div></div>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-section">Créer</div>
      <div class="nav-item active" onclick="showPage('generate')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Nouveau site
      </div>
      <div class="nav-item" onclick="showPage('sites')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Mes sites
      </div>
      <div class="nav-item" onclick="showPage('scrape')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Scraper
      </div>
      <div class="nav-section">Business</div>
      <div class="nav-item" onclick="showPage('finance')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Finance
      </div>
      <div class="nav-section">Compte</div>
      <div class="nav-item" onclick="showPage('settings')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>Paramètres
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="api-mini">API <span id="apiDot" style="color:var(--success);font-weight:500">● ok</span></div>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">Nouveau site</div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="badge-env" id="envBadge">● local</div>
        <button class="btn btn-ghost btn-sm" onclick="showPage('settings')">Config</button>
      </div>
    </div>
    <div class="content" id="pageContent"></div>
  </div>
</div>
<div class="toast-wrap" id="toastWrap"></div>
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="modalTitle">Info</div><button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()">✕</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────
const S={
  apiUrl:localStorage.getItem('sg_url')||'',
  apiKey:localStorage.getItem('sg_key')||'',
  sites:JSON.parse(localStorage.getItem('sg_sites')||'[]'),
  sales:JSON.parse(localStorage.getItem('sg_sales')||'[]'),
  pricing:JSON.parse(localStorage.getItem('sg_pricing')||'{"oneshot":199,"abo":29,"aboLabel":"Maintenance mensuelle"}'),
  page:'generate',
  urls:[''],
  sector:'',
  options:[],
  prompt:'',
  editSite:null,
};

// ── UTILS ──────────────────────────────────────────────────────────
function toast(msg,type='info'){const t=document.createElement('div');t.className='toast toast-'+type;t.innerHTML='<span>'+(type==='success'?'✓':type==='error'?'✕':'ℹ')+'</span> '+msg;document.getElementById('toastWrap').appendChild(t);setTimeout(()=>t.remove(),3500)}
function openModal(title,body,footer){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=body;document.getElementById('modalFooter').innerHTML=footer||'';document.getElementById('modalOverlay').style.display='flex'}
function closeModal(){document.getElementById('modalOverlay').style.display='none'}
function fmtDate(iso){if(!iso)return'—';const d=new Date(iso);return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'})}
function fmtMoney(n){return Number(n).toLocaleString('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:0})}
async function api(ep,method,body){
  if(!S.apiKey){toast('Configure ta clé API','error');throw new Error('no key')}
  const r=await fetch(S.apiUrl+ep,{method:method||'GET',headers:{'Content-Type':'application/json','X-Api-Key':S.apiKey},body:body?JSON.stringify(body):undefined});
  const d=await r.json();if(!r.ok)throw new Error(d.error||'Erreur');return d
}
function save(){localStorage.setItem('sg_sites',JSON.stringify(S.sites));localStorage.setItem('sg_sales',JSON.stringify(S.sales));localStorage.setItem('sg_pricing',JSON.stringify(S.pricing))}

// ── NAV ────────────────────────────────────────────────────────────
const titles={generate:'Nouveau site',sites:'Mes sites',scrape:'Scraper',finance:'Finance',settings:'Paramètres',edit:'Édition du site'};
function showPage(p,data){
  S.page=p;if(data)S.editSite=data;
  document.getElementById('topbarTitle').textContent=titles[p]||p;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>{if(el.getAttribute('onclick')?.includes("'"+p+"'"))el.classList.add('active')});
  ({generate:renderGenerate,sites:renderSites,scrape:renderScrape,finance:renderFinance,settings:renderSettings,edit:renderEdit})[p]?.()
}

// ── PAGE GENERATE ──────────────────────────────────────────────────
const SITE_OPTIONS=[
  {id:'booking',icon:'📅',label:'Réservation en ligne',desc:'Agenda Google intégré + sélection de créneau'},
  {id:'devis',icon:'📋',label:'Devis automatique',desc:'Formulaire interactif avec estimation de prix en live'},
  {id:'acompte',icon:'💳',label:'Paiement acompte',desc:'Lien Stripe / SumUp pour encaisser avant RDV'},
  {id:'whatsapp',icon:'💬',label:'Bouton WhatsApp flottant',desc:'Contact direct, toujours visible sur mobile'},
  {id:'urgence',icon:'🚨',label:'Mode urgence 24h/7j',desc:'Bandeau + numéro d\'urgence mis en avant'},
  {id:'popup',icon:'🎁',label:'Popup offre de bienvenue',desc:'Réduction ou cadeau pour le 1er RDV'},
  {id:'fidelite',icon:'🏆',label:'Programme fidélité',desc:'Carte de fidélité digitale (ex: 10e RDV offert)'},
  {id:'before_after',icon:'🔄',label:'Avant / Après',desc:'Slider comparatif pour montrer les résultats'},
  {id:'chatbot',icon:'🤖',label:'Chatbot FAQ',desc:'Répond aux questions fréquentes automatiquement'},
  {id:'map',icon:'📍',label:'Carte & itinéraire',desc:'Google Maps intégré avec bouton "Y aller"'},
  {id:'newsletter',icon:'📧',label:'Capture email',desc:'Formulaire d\'inscription newsletter / promo'},
  {id:'multilingue',icon:'🌍',label:'Site bilingue FR/EN',desc:'Toggle langue avec traduction automatique'},
];

function renderGenerate(){
  const wk=S.sites.filter(s=>new Date(s.created_at)>new Date(Date.now()-7*86400000)).length;
  document.getElementById('pageContent').innerHTML=`
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Sites générés</div><div class="stat-value">${S.sites.length}</div></div>
    <div class="stat-card"><div class="stat-label">Cette semaine</div><div class="stat-value">${wk}</div></div>
    <div class="stat-card"><div class="stat-label">CA total</div><div class="stat-value" style="font-size:18px">${fmtMoney(S.sales.reduce((a,s)=>a+(s.amount||0),0))}</div></div>
    <div class="stat-card"><div class="stat-label">Ventes</div><div class="stat-value">${S.sales.length}</div></div>
  </div>
  <div class="gen-form">
    <div class="form-title">✨ Nouveau site</div>
    <div class="form-row">
      <div>
        <label style="display:block;margin-bottom:6px">URLs sources <span style="color:var(--text3);font-weight:400">(Instagram, TikTok, site, Google Maps…)</span></label>
        <div class="url-list" id="urlList">${S.urls.map((u,i)=>`<div class="url-item"><input type="url" placeholder="https://instagram.com/mon_client" value="${u}" oninput="S.urls[${i}]=this.value">${i>0?`<button class="btn btn-ghost btn-icon btn-sm" onclick="rmUrl(${i})">✕</button>`:''}</div>`).join('')}</div>
        <button class="add-url" onclick="addUrl()">+ Ajouter une URL</button>
      </div>
      <div>
        <label style="display:block;margin-bottom:6px">Nom de domaine (optionnel)</label>

function toggleOption(id,el){
  const idx=S.options.indexOf(id);
  if(idx===-1){S.options.push(id);el.classList.add('selected');el.querySelector('input').checked=true}
  else{S.options.splice(idx,1);el.classList.remove('selected');el.querySelector('input').checked=false}
}
function addUrl(){if(S.urls.length>=5){toast('Max 5 URLs','error');return}S.urls.push('');renderGenerate()}
function rmUrl(i){S.urls.splice(i,1);renderGenerate()}

const steps=['Connexion API…','Scraping des sources…','Extraction des données…','Génération avec Claude…','Finalisation…'];
function setStep(n){
  document.getElementById('pFill').style.width=Math.round(n/steps.length*100)+'%';
  document.getElementById('stepList').innerHTML=steps.map((s,i)=>`<div class="step-item${i<n?' done':i===n?' active':''}"><div class="step-dot"></div>${s}${i<n?' ✓':''}</div>`).join('')
}

async function doGenerate(){
  const urls=S.urls.filter(u=>u.trim());
  if(!urls.length&&!S.sector){toast('Ajoute une URL ou un secteur','error');return}
  if(!S.apiUrl){toast('Configure l\'API dans Paramètres','error');showPage('settings');return}
  const btn=document.getElementById('genBtn');btn.disabled=true;btn.textContent='Génération…';
  document.getElementById('genProgress').style.display='block';
  setStep(0);
  const domain=document.getElementById('domainInput')?.value.trim()||'';
  try{
    await new Promise(r=>setTimeout(r,400));setStep(1);
    await new Promise(r=>setTimeout(r,500));setStep(2);
    const res=await api('/api/generate','POST',{urls:urls.length?urls:undefined,sector:S.sector||'general',options:S.options,domain,prompt:S.prompt});
    setStep(3);await new Promise(r=>setTimeout(r,400));setStep(4);
    const site={id:res.site_id,business_name:res.business_data?.business_name||'Nouveau site',sector:S.sector||'general',urls,domain,options:S.options,business_data:res.business_data,html:res.html,created_at:new Date().toISOString(),status:'draft'};
    S.sites.unshift(site);save();
    await new Promise(r=>setTimeout(r,300));
    toast('Site "'+site.business_name+'" généré !','success');
    btn.disabled=false;btn.textContent='⚡ Générer le site';
    document.getElementById('genProgress').style.display='none';
    S.urls=[''];S.options=[];S.sector='';
    showPage('edit',site);
  }catch(err){
    toast('Erreur : '+err.message,'error');
    btn.disabled=false;btn.textContent='⚡ Générer le site';
    document.getElementById('genProgress').style.display='none';
  }
}

async function doScrapeOnly(){
  const urls=S.urls.filter(u=>u.trim());
  if(!urls.length){toast('Ajoute au moins une URL','error');return}
  try{toast('Scraping…','info');const r=await api('/api/scrape','POST',{urls});openModal('Données extraites',`<pre style="font-size:11px;color:var(--text2);background:var(--bg3);padding:12px;border-radius:8px;overflow:auto;max-height:400px">${JSON.stringify(r.data,null,2)}</pre>`,'<button class="btn btn-ghost" onclick="closeModal()">Fermer</button>')}
  catch(err){toast('Erreur: '+err.message,'error')}
}

function toggleEditOption(id,el,siteId){
  const site=S.sites.find(s=>s.id===siteId);if(!site)return;
  site.options=site.options||[];
  const idx=site.options.indexOf(id);
  if(idx===-1){site.options.push(id);el.classList.add('selected');el.querySelector('input').checked=true}
  else{site.options.splice(idx,1);el.classList.remove('selected');el.querySelector('input').checked=false}
  S.editSite=site;save();
}

function saveEditInfo(siteId){
  const site=S.sites.find(s=>s.id===siteId);if(!site)return;
  site.business_name=document.getElementById('editName').value||site.business_name;
  site.sector=document.getElementById('editSector').value||site.sector;
  site.domain=document.getElementById('editDomain').value;
  site.status=document.getElementById('editStatus').value;
  const po=document.getElementById('editPriceOnce');const pm=document.getElementById('editPriceMo');
  if(po)site.price_once=parseFloat(po.value)||S.pricing.oneshot;
  if(pm)site.price_mo=parseFloat(pm.value)||S.pricing.abo;
  S.editSite=site;save();toast('Sauvegardé','success');
}

async function sendChat(siteId){
  const input=document.getElementById('chatInput');
  const msg=input.value.trim();if(!msg)return;
  input.value='';
  const site=S.sites.find(s=>s.id===siteId);if(!site)return;
  addChatMsg(msg,'user');
  const loading=addChatMsg('Modification en cours…','ai loading');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:8000,
        system:`Tu es un expert en création de sites web. Tu modifies du HTML existant selon les instructions. Tu retournes UNIQUEMENT le HTML complet modifié, sans markdown ni backticks.`,
        messages:[{role:'user',content:`Voici le site HTML actuel:\n\n${site.html}\n\nInstruction de modification: ${msg}\n\nRetourne le HTML complet modifié.`}]
      })
    });
    const data=await res.json();
    const newHtml=data.content?.[0]?.text||'';
    if(newHtml.includes('<!DOCTYPE')||newHtml.includes('<html')){
      site.html=newHtml;S.editSite=site;save();
      loading.textContent='✅ Site modifié ! Aperçu mis à jour.';
      loading.classList.remove('loading');
      toast('Site modifié avec succès','success');
    }else{
      loading.textContent='Modification appliquée. Clique sur Aperçu pour voir le résultat.';
      loading.classList.remove('loading');
    }
  }catch(err){
    loading.textContent='Erreur : '+err.message;loading.classList.remove('loading');
    toast('Erreur modification','error');
  }
}

function quickChat(siteId,msg){
  document.getElementById('chatInput').value=msg;
  sendChat(siteId);
}

function addChatMsg(text,type){
  const msgs=document.getElementById('chatMsgs');
  const div=document.createElement('div');
  div.className='chat-msg '+type;
  div.innerHTML=text;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  return div;
}

async function regenSite(siteId){

    const res=await api('/api/generate','POST',{urls:site.urls,sector:site.sector,options:site.options,business_data:site.business_data});
    site.html=res.html;S.editSite=site;save();
    toast('Site regénéré !','success');renderEdit();
  }catch(err){toast('Erreur: '+err.message,'error')}
}

function confirmSale(siteId){

}

function addScrUrl(){if(window._sn>=5)return;const l=document.getElementById('scrUrlList');const d=document.createElement('div');d.className='url-item';d.innerHTML=`<input type="url" id="su${window._sn}" placeholder="https://..."><button class="btn btn-ghost btn-icon btn-sm" onclick="this.parentElement.remove()">✕</button>`;l.appendChild(d);window._sn++}
async function doScrape(){const urls=Array.from(document.querySelectorAll('[id^=su]')).map(i=>i.value.trim()).filter(Boolean);if(!urls.length){toast('Ajoute une URL','error');return}const res=document.getElementById('scrRes');res.innerHTML='<p style="color:var(--text3)">Scraping…</p>';try{const r=await api('/api/scrape','POST',{urls});res.innerHTML=`<div style="color:var(--success);font-size:13px;font-weight:500;margin-bottom:10px">✓ Données extraites</div><pre style="font-size:11px;color:var(--text2);background:var(--bg3);padding:12px;border-radius:8px;overflow:auto;max-height:350px;border:1px solid var(--border)">${JSON.stringify(r.data,null,2)}</pre>`;toast('OK','success')}catch(err){res.innerHTML=`<p style="color:var(--danger)">${err.message}</p>`}}

  const total=S.sales.reduce((a,s)=>a+(s.amount||0),0);
  const thisMonth=S.sales.filter(s=>new Date(s.date).getMonth()===new Date().getMonth()).reduce((a,s)=>a+(s.amount||0),0);
  const abos=S.sales.filter(s=>s.type==='abo').length;
  document.getElementById('pageContent').innerHTML=`
  <!-- Stats -->
  <div class="stats-grid" style="margin-bottom:20px">
    <div class="stat-big"><div class="stat-big-label">CA total</div><div class="stat-big-val" style="color:var(--accent)">${fmtMoney(total)}</div><div class="stat-big-delta">${S.sales.length} vente${S.sales.length>1?'s':''}</div></div>
    <div class="stat-big"><div class="stat-big-label">Ce mois</div><div class="stat-big-val">${fmtMoney(thisMonth)}</div><div class="stat-big-delta">${S.sales.filter(s=>new Date(s.date).getMonth()===new Date().getMonth()).length} ventes</div></div>
    <div class="stat-big"><div class="stat-big-label">Récurrent mensuel</div><div class="stat-big-val" style="color:var(--success)">${fmtMoney(abos*S.pricing.abo)}</div><div class="stat-big-delta">${abos} abonnement${abos>1?'s':''}</div></div>
  </div>
  <!-- Pricing par défaut -->
  <div class="card" style="margin-bottom:16px">
    <div class="form-title" style="margin-bottom:16px">💰 Tarifs par défaut</div>
    <div class="pricing-grid">
      <div class="pricing-card featured">
        <div style="font-size:11px;color:var(--accent);font-weight:600;margin-bottom:8px">ONE-SHOT</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:12px">Site clé en main livré</div>
        <label style="display:block;margin-bottom:6px">Prix de vente</label>
        <div class="price-input-wrap"><span>€</span><input type="number" id="pOneshot" value="${S.pricing.oneshot}" oninput="updateSim()"></div>
      </div>
      <div class="pricing-card">
        <div style="font-size:11px;color:var(--success);font-weight:600;margin-bottom:8px">ABONNEMENT</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:12px">Maintenance + hébergement</div>
        <label style="display:block;margin-bottom:6px">Prix mensuel</label>
        <div class="price-input-wrap"><span>€</span><input type="number" id="pAbo" value="${S.pricing.abo}" oninput="updateSim()"></div>
      </div>
    </div>
    <div style="background:var(--bg3);border-radius:10px;padding:14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:14px">
      <div><div style="font-size:11px;color:var(--text3)">5 sites/mois</div><div id="simR1" style="font-size:16px;font-weight:600;color:var(--accent);margin-top:4px">${fmtMoney(5*S.pricing.oneshot)}</div></div>
      <div><div style="font-size:11px;color:var(--text3)">10 abos actifs</div><div id="simR2" style="font-size:16px;font-weight:600;color:var(--success);margin-top:4px">${fmtMoney(10*S.pricing.abo)}</div></div>
      <div><div style="font-size:11px;color:var(--text3)">Total estimé/mois</div><div id="simR3" style="font-size:16px;font-weight:600;margin-top:4px">${fmtMoney(5*S.pricing.oneshot+10*S.pricing.abo)}</div></div>
    </div>
    <button class="btn btn-primary btn-sm" style="margin-top:14px" onclick="savePricing()">Sauvegarder les tarifs</button>
  </div>
  <!-- Ventes -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="form-title" style="margin-bottom:0">Historique des ventes</div>
      <button class="btn btn-ghost btn-sm" onclick="addManualSale()">+ Ajouter</button>
    </div>
    ${S.sales.length===0?'<div class="empty"><div class="empty-icon">💰</div><h4>Aucune vente</h4><p>Génère un site et marque-le vendu</p></div>':
    '<div class="sales-list">'+S.sales.map(s=>`
      <div class="sales-row">
        <div class="sales-name">${s.client||'Client'}</div>
        <span class="sales-type type-${s.type==='abo'?'abo':'onshot'}">${s.type==='abo'?'Abonnement':'One-shot'}</span>
        <span style="font-weight:600;color:var(--success)">${fmtMoney(s.amount)}</span>
        <span style="color:var(--text3);font-size:12px">${fmtDate(s.date)}</span>
        <button class="btn btn-danger btn-sm btn-icon" onclick="delSale('${s.id}')">✕</button>
      </div>`).join('')+'</div>'}
  </div>`;
}
function updateSim(){
  const po=parseFloat(document.getElementById('pOneshot')?.value)||S.pricing.oneshot;
  const pa=parseFloat(document.getElementById('pAbo')?.value)||S.pricing.abo;
  if(document.getElementById('simR1'))document.getElementById('simR1').textContent=fmtMoney(5*po);
  if(document.getElementById('simR2'))document.getElementById('simR2').textContent=fmtMoney(10*pa);
  if(document.getElementById('simR3'))document.getElementById('simR3').textContent=fmtMoney(5*po+10*pa);
}
function savePricing(){
  S.pricing.oneshot=parseFloat(document.getElementById('pOneshot').value)||199;
  S.pricing.abo=parseFloat(document.getElementById('pAbo').value)||29;
  save();toast('Tarifs sauvegardés','success');
}
function delSale(id){if(!confirm('Supprimer ?'))return;S.sales=S.sales.filter(s=>s.id!==id);save();renderFinance()}
function addManualSale(){
  openModal('Ajouter une vente',`
    <div style="display:flex;flex-direction:column;gap:12px">
      <div><label style="display:block;margin-bottom:6px">Client</label><input type="text" id="mClient" placeholder="Nom du client"></div>
      <div><label style="display:block;margin-bottom:6px">Type</label><select id="mType"><option value="oneshot">One-shot</option><option value="abo">Abonnement</option></select></div>
      <div><label style="display:block;margin-bottom:6px">Montant (€)</label><input type="number" id="mAmount" value="${S.pricing.oneshot}"></div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
     <button class="btn btn-primary" onclick="confirmManualSale()">Ajouter</button>`
  );
}
function confirmManualSale(){
  const client=document.getElementById('mClient').value||'Client';
  const type=document.getElementById('mType').value;
  const amount=parseFloat(document.getElementById('mAmount').value)||0;
  S.sales.unshift({id:Date.now().toString(),client,type,amount,date:new Date().toISOString()});
  save();closeModal();toast(`Vente de ${fmtMoney(amount)} ajoutée`,'success');renderFinance();
}

// ── PAGE SETTINGS ──────────────────────────────────────────────────
function renderSettings(){
  document.getElementById('pageContent').innerHTML=`
  <div class="card" style="max-width:520px">
    <div class="form-title">Connexion API</div>
    <div style="margin-bottom:16px"><label style="display:block;margin-bottom:6px">URL du serveur</label><input type="url" id="sUrl" value="${S.apiUrl}" placeholder="https://sitegen-api-xxx.europe-west1.run.app"></div>
    <div style="margin-bottom:16px"><label style="display:block;margin-bottom:6px">Clé API</label><div style="display:flex;gap:8px"><input type="password" id="sKey" value="${S.apiKey}" placeholder="sitegen-alex-2024"><button class="btn btn-ghost btn-sm" onclick="const f=document.getElementById('sKey');f.type=f.type==='password'?'text':'password'">👁</button></div></div>
    <div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="saveCfg()">Sauvegarder</button><button class="btn btn-ghost" onclick="testConn()">Tester</button></div>
    <div id="connTest" style="margin-top:12px;font-size:13px"></div>
  </div>
  <div class="card" style="max-width:520px;margin-top:16px">
    <div class="form-title">Données</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:12px">${S.sites.length} site(s) · ${S.sales.length} vente(s)</p>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="expData()">⬇ Exporter</button>
      <button class="btn btn-danger btn-sm" onclick="clrData()">Tout effacer</button>
    </div>
  </div>`;
}
function saveCfg(){S.apiUrl=document.getElementById('sUrl').value.trim().replace(/\/$/,'');S.apiKey=document.getElementById('sKey').value.trim();localStorage.setItem('sg_url',S.apiUrl);localStorage.setItem('sg_key',S.apiKey);document.getElementById('envBadge').textContent='● '+(S.apiUrl?new URL(S.apiUrl||'http://x').hostname:'local');toast('Sauvegardé','success')}
async function testConn(){const ct=document.getElementById('connTest');ct.textContent='Test…';try{const r=await fetch(S.apiUrl+'/health');const d=await r.json();ct.innerHTML=`<span style="color:var(--success)">✓ Connecté v${d.version}</span>`}catch{ct.innerHTML=`<span style="color:var(--danger)">✕ Inaccessible</span>`}}
function expData(){const b=new Blob([JSON.stringify({sites:S.sites,sales:S.sales,pricing:S.pricing},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='sitegen-backup.json';a.click()}
function clrData(){if(!confirm('Effacer toutes les données ?'))return;S.sites=[];S.sales=[];localStorage.removeItem('sg_sites');localStorage.removeItem('sg_sales');save();toast('Effacé','success');renderSettings()}

// ── INIT ───────────────────────────────────────────────────────────
if(S.apiUrl)document.getElementById('envBadge').textContent='● '+(new URL(S.apiUrl||'http://x').hostname);
showPage('generate');
</script>
</body>
</html>
