<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteGen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0F;--bg2:#111118;--bg3:#1A1A24;
  --border:#2A2A38;--border2:#353548;
  --text:#F0F0F8;--text2:#9090A8;--text3:#5A5A72;
  --accent:#7C6FED;--accent2:#5A4FC5;
  --success:#2ECC8A;--danger:#E05060;--orange:#F0A030;
  --r:10px;--rl:16px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;height:100vh;overflow:hidden;display:flex}
.sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:20px}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.logo-name{font-weight:600;font-size:14px}
.logo-sub{font-size:10px;color:var(--text3)}
.nav{flex:1;padding:10px 8px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;margin-bottom:2px;transition:all .15s}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.active{background:rgba(124,111,237,.15);color:var(--accent);font-weight:500}
.ni svg{width:16px;height:16px;flex-shrink:0;opacity:.7}
.ni.active svg{opacity:1}
.ns{font-size:10px;color:var(--text3);padding:14px 10px 4px;text-transform:uppercase;letter-spacing:.06em}
.sf{padding:10px 8px;border-top:1px solid var(--border)}
.sf-inner{padding:8px 10px;background:var(--bg3);border-radius:8px;font-size:11px;color:var(--text3)}
.ttl{font-weight:600;font-size:15px;flex:1}
.badge{font-size:11px;padding:3px 8px;background:rgba(46,204,138,.1);color:var(--success);border-radius:20px;border:1px solid rgba(46,204,138,.2)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .15s;white-space:nowrap}
.bp{background:var(--accent);color:#fff}.bp:hover{background:var(--accent2)}.bp:disabled{opacity:.5;cursor:not-allowed}
.bg{background:transparent;color:var(--text2);border:1px solid var(--border)}.bg:hover{background:var(--bg3);color:var(--text)}
.bd{background:rgba(224,80,96,.1);color:var(--danger);border:1px solid rgba(224,80,96,.2)}
.bo{background:var(--orange);color:#fff}.bo:hover{background:#d4891f}
.bs{background:rgba(46,204,138,.1);color:var(--success);border:1px solid rgba(46,204,138,.2)}
.sm{padding:4px 9px;font-size:12px}
.ic{width:30px;height:30px;padding:0;justify-content:center}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:18px}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.sl{font-size:11px;color:var(--text3);margin-bottom:6px}
.sv{font-size:22px;font-weight:600}
.ft{font-weight:600;font-size:14px;margin-bottom:14px}
label{font-size:12px;color:var(--text2);font-weight:500;display:block;margin-bottom:5px}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--text3)}
textarea{resize:vertical}
select option{background:var(--bg3)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.ul{display:flex;flex-direction:column;gap:7px}
.ui{display:flex;gap:7px;align-items:center}
.ui input{flex:1}
.au{font-size:12px;color:var(--accent);cursor:pointer;padding:5px 0;background:none;border:none;font-family:inherit}
.og{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px}
.oc{padding:8px 10px;border:1px solid var(--border);border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s;font-size:12px}
.oc:hover{border-color:var(--border2)}
.oc.sel{border-color:var(--orange);background:rgba(240,160,48,.08)}
.oc input{width:13px;height:13px;flex-shrink:0;accent-color:var(--orange)}
.pb{height:4px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:10px 0}
.pf{height:100%;background:var(--accent);border-radius:4px;transition:width .4s}
.stl{display:flex;flex-direction:column;gap:7px;margin-top:8px}
.sti{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.sti.done{color:var(--success)}.sti.active{color:var(--text)}
.sd{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0}
.sti.done .sd{background:var(--success)}
.sti.active .sd{background:var(--accent);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.gh{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.gh h3{font-size:14px;font-weight:600;flex:1}
.sw{position:relative;max-width:240px;flex:1}
.sw svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);width:13px;height:13px}
.sw input{padding-left:28px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.kard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;transition:border .15s}
.kard:hover{border-color:var(--border2)}
.kprev{height:120px;background:var(--bg3);position:relative;padding:10px;display:flex;flex-direction:column;gap:5px;opacity:.65}
.mb{height:5px;border-radius:3px;background:var(--border2)}
.mb.s{width:35%}.mb.m{width:60%}.mb.a{background:var(--accent);width:28%}
.mr{display:flex;gap:5px}
.mbl{flex:1;height:26px;border-radius:4px;background:var(--border)}
.kdot{position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%}
.kinfo{padding:12px}
.kname{font-weight:600;font-size:13px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kmeta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;background:rgba(124,111,237,.12);color:var(--accent)}
.kact{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.el{display:grid;grid-template-columns:1fr 360px;gap:16px;height:calc(100vh - 112px)}
.eleft{display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.eright{display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.stitle{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.cbox{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);display:flex;flex-direction:column;height:360px}
.cmsgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:9px}
.cm{max-width:85%;padding:9px 12px;border-radius:11px;font-size:13px;line-height:1.5}
.cm.u{background:var(--accent);color:#fff;align-self:flex-end;border-radius:11px 11px 3px 11px}
.cm.a{background:var(--bg3);color:var(--text);align-self:flex-start;border-radius:11px 11px 11px 3px}
.ciw{padding:10px;border-top:1px solid var(--border);display:flex;gap:7px}
.ciw input{flex:1}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px)}
.md{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);width:96%;max-width:1100px;max-height:96vh;display:flex;flex-direction:column}
.mh{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mt{font-weight:600;font-size:14px}
.mb2{padding:20px;overflow-y:auto;flex:1}
.mf{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:7px}
.tw{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:7px;z-index:200}
.toast{padding:10px 14px;border-radius:9px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;animation:ti .2s ease;box-shadow:0 4px 20px rgba(0,0,0,.4)}
@keyframes ti{from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1}}
.ts{background:rgba(46,204,138,.15);border:1px solid rgba(46,204,138,.3);color:var(--success)}
.te{background:rgba(224,80,96,.15);border:1px solid rgba(224,80,96,.3);color:var(--danger)}
.ti{background:rgba(124,111,237,.15);border:1px solid rgba(124,111,237,.3);color:var(--accent)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.pc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px}
.pc.feat{border-color:var(--accent)}
.piw{position:relative;margin-top:5px}
.piw span{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3)}
.piw input{padding-left:22px}
.stgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stbig{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px}
.stv{font-size:28px;font-weight:600;margin:6px 0 3px}
.stl2{font-size:11px;color:var(--text3)}
.std{font-size:11px;color:var(--success)}
.slist{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.srow{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.srow:last-child{border-bottom:none}
.sn{flex:1;font-weight:500}
.styp{font-size:10px;padding:2px 7px;border-radius:9px}
.to{background:rgba(124,111,237,.1);color:var(--accent)}
.ta{background:rgba(46,204,138,.1);color:var(--success)}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-i{font-size:32px;margin-bottom:10px;opacity:.4}
.empty h4{font-size:14px;color:var(--text2);margin-bottom:5px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
@media(max-width:800px){.sidebar{display:none}.sg{grid-template-columns:repeat(2,1fr)}.el{grid-template-columns:1fr}.pgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div><div class="logo-name">SiteGen</div><div class="logo-sub">Site builder AI</div></div>
  </div>
  <nav class="nav">
    <div class="ns">Créer</div>
    <div class="ni active" id="nav-generate" onclick="go('generate')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Nouveau site
    </div>
    <div class="ni" id="nav-sites" onclick="go('sites')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Mes sites
    </div>
    <div class="ni" id="nav-scrape" onclick="go('scrape')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Scraper
    </div>
    <div class="ns">Business</div>
    <div class="ni" id="nav-finance" onclick="go('finance')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Finance
    </div>
    <div class="ns">Compte</div>
    <div class="ni" id="nav-settings" onclick="go('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>Paramètres
    </div>
  </nav>
  <div class="sf"><div class="sf-inner">API <span id="apidot" style="color:var(--success);font-weight:500">● ok</span></div></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="ttl" id="ttl">Nouveau site</div>
    <div class="badge" id="envb">● local</div>
    <button class="btn bg sm" onclick="go('settings')">Config</button>
  </div>
  <div class="content" id="pg"></div>
</div>

<div class="tw" id="tw"></div>

<div class="mo" id="mo" style="display:none" onclick="if(event.target===this)closeMo()">
  <div class="md">
    <div class="mh"><div class="mt" id="mot">Info</div><button class="btn bg ic sm" onclick="closeMo()">✕</button></div>
    <div class="mb2" id="mob"></div>
    <div class="mf" id="mof"></div>
  </div>
</div>

<script>
// STATE
const D = {
  url: localStorage.getItem('sg_url')||'',
  key: localStorage.getItem('sg_key')||'',
  sites: JSON.parse(localStorage.getItem('sg_sites')||'[]'),
  sales: JSON.parse(localStorage.getItem('sg_sales')||'[]'),
  pricing: JSON.parse(localStorage.getItem('sg_pricing')||'{"one":199,"mo":29}'),
  urls: [''],
  opts: [],
  prompt: '',
  domain: '',
  photos: [],
  editId: null,
};

// UTILS
function sv() {
  localStorage.setItem('sg_sites', JSON.stringify(D.sites));
  localStorage.setItem('sg_sales', JSON.stringify(D.sales));
  localStorage.setItem('sg_pricing', JSON.stringify(D.pricing));
}

function toast(msg, t) {
  t = t||'i';
  const el = document.createElement('div');
  el.className = 'toast t' + t;
  el.innerHTML = (t==='s'?'✓':t==='e'?'✕':'ℹ') + ' ' + msg;
  document.getElementById('tw').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

function mo(title, body, foot) {
  document.getElementById('mot').textContent = title;
  document.getElementById('mob').innerHTML = body;
  document.getElementById('mof').innerHTML = foot||'';
  document.getElementById('mo').style.display = 'flex';
}
function closeMo() { document.getElementById('mo').style.display = 'none'; }

function fd(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function fm(n) { return Number(n||0).toLocaleString('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:0}); }
function esc(s) { return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

async function api(ep, method, body) {
  if (!D.key) { toast('Configure ta clé API', 'e'); throw new Error('no key'); }
  const r = await fetch(D.url + ep, {
    method: method||'GET',
    headers: {'Content-Type':'application/json','X-Api-Key':D.key},
    body: body ? JSON.stringify(body) : undefined
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error||'Erreur');
  return d;
}

// NAV
const PAGE_TITLES = {generate:'Nouveau site',sites:'Mes sites',scrape:'Scraper',finance:'Finance',settings:'Paramètres',edit:'Édition du site'};

function go(page, data) {
  if (data) D.editId = data;
  document.getElementById('ttl').textContent = PAGE_TITLES[page]||page;
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('active'));
  const nav = document.getElementById('nav-' + page);
  if (nav) nav.classList.add('active');
  const pages = {generate:pGenerate, sites:pSites, scrape:pScrape, finance:pFinance, settings:pSettings, edit:pEdit};
  if (pages[page]) pages[page]();
}

// OPTIONS
const OPTS = [
  {id:'booking',e:'📅',l:'Réservation en ligne'},
  {id:'devis',e:'📋',l:'Devis automatique'},
  {id:'acompte',e:'💳',l:'Paiement acompte'},
  {id:'whatsapp',e:'💬',l:'WhatsApp flottant'},
  {id:'urgence',e:'🚨',l:'Urgence 24h/7j'},
  {id:'popup',e:'🎁',l:'Popup offre bienvenue'},
  {id:'fidelite',e:'🏆',l:'Programme fidélité'},
  {id:'before_after',e:'🔄',l:'Avant / Après'},
  {id:'chatbot',e:'🤖',l:'Chatbot FAQ'},
  {id:'map',e:'📍',l:'Carte & itinéraire'},
  {id:'newsletter',e:'📧',l:'Capture email'},
  {id:'multilingue',e:'🌍',l:'Bilingue FR/EN'},
];

function togOpt(id, el) {
  const i = D.opts.indexOf(id);
  if (i === -1) { D.opts.push(id); el.classList.add('sel'); el.querySelector('input').checked = true; }
  else { D.opts.splice(i,1); el.classList.remove('sel'); el.querySelector('input').checked = false; }
}

// PAGE GENERATE
function pGenerate() {
  const wk = D.sites.filter(s => new Date(s.created_at) > new Date(Date.now()-7*86400000)).length;
  const total = D.sales.reduce((a,s)=>a+(s.amount||0),0);
  
  let html = '<div class="sg">';
  html += '<div class="sc"><div class="sl">Sites générés</div><div class="sv">' + D.sites.length + '</div></div>';
  html += '<div class="sc"><div class="sl">Cette semaine</div><div class="sv">' + wk + '</div></div>';
  html += '<div class="sc"><div class="sl">CA total</div><div class="sv" style="font-size:16px">' + fm(total) + '</div></div>';
  html += '<div class="sc"><div class="sl">Ventes</div><div class="sv">' + D.sales.length + '</div></div>';
  html += '</div>';
  
  html += '<div class="card" style="margin-bottom:16px">';
  html += '<div class="ft">✨ Nouveau site</div>';
  
  // URLs
  html += '<div style="margin-bottom:12px"><label>URLs sources (Instagram, TikTok, site, Google Maps…)</label>';
  html += '<div class="ul" id="ul">';
  D.urls.forEach(function(u, i) {
    html += '<div class="ui"><input type="url" placeholder="https://instagram.com/client" value="' + esc(u) + '" oninput="D.urls[' + i + ']=this.value">';
    if (i > 0) html += '<button class="btn bg ic sm" onclick="rmU(' + i + ')">✕</button>';
    html += '</div>';
  });
  html += '</div>';
  html += '<button class="au" onclick="addU()">+ Ajouter une URL</button></div>';
  
  // Domain
  html += '<div class="fr">';
  html += '<div><label>Nom de domaine (optionnel)</label><input type="text" id="domI" placeholder="mon-client.fr" value="' + esc(D.domain) + '" oninput="D.domain=this.value"></div>';
  html += '<div></div></div>';
  
  // Prompt
  html += '<div style="margin-bottom:12px"><label>✍️ Instructions pour Claude</label>';
  html += '<textarea rows="3" placeholder="Décris le site : style, couleurs, nom du client, services à mettre en avant..." oninput="D.prompt=this.value" style="min-height:75px">' + esc(D.prompt) + '</textarea></div>';
  
  // Options
  html += '<div style="margin-bottom:12px"><label>Fonctionnalités à intégrer</label>';
  html += '<div class="og">';
  OPTS.forEach(function(o) {
    const sel = D.opts.indexOf(o.id) !== -1;
    html += '<div class="oc' + (sel?' sel':'') + '" onclick="togOpt(\'' + o.id + '\',this)">';
    html += '<input type="checkbox"' + (sel?' checked':'') + ' onclick="event.stopPropagation()">';
    html += o.e + ' ' + o.l + '</div>';
  });
  html += '</div></div>';
  
  // Photos
  html += '<div style="margin-bottom:14px"><label>📎 Photos supplémentaires (optionnel)</label>';
  html += '<div style="border:1px dashed var(--border);border-radius:8px;padding:14px;text-align:center;cursor:pointer" onclick="document.getElementById(\'phi\').click()">';
  html += '<div style="font-size:20px;margin-bottom:4px">🖼️</div>';
  html += '<div style="font-size:12px;color:var(--text3)">Clique pour ajouter des photos</div>';
  html += '<input type="file" id="phi" accept="image/*" multiple style="display:none" onchange="addPhotos(this.files)"></div>';
  html += '<div style="display:flex;gap:7px;margin-top:7px"><input type="url" id="purl" placeholder="Ou colle une URL d\'image..." style="flex:1"><button class="btn bg sm" onclick="addPhotoUrl()">+ URL</button></div>';
  html += '<div id="pprev" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:7px">';
  D.photos.forEach(function(src, i) {
    html += '<div style="position:relative;width:56px;height:56px;border-radius:7px;overflow:hidden;border:1px solid var(--border)">';
    html += '<img src="' + src + '" style="width:100%;height:100%;object-fit:cover">';
    html += '<button onclick="D.photos.splice(' + i + ',1);pGenerate()" style="position:absolute;top:1px;right:1px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:50%;width:14px;height:14px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>';
    html += '</div>';
  });
  html += '</div></div>';
  
  // Buttons

const STEPS = ['Connexion API…','📸 Scraping Instagram (Apify)…','🔍 Extraction des données…','✨ Génération avec Claude (1-2 min)…','💾 Finalisation…'];

function setStep(n) {
  document.getElementById('pf').style.width = Math.round(n/STEPS.length*100) + '%';
  let h = '';
  STEPS.forEach(function(s, i) {
    h += '<div class="sti' + (i<n?' done':i===n?' active':'') + '"><div class="sd"></div>' + s + (i<n?' ✓':'') + '</div>';
  });
  document.getElementById('stl').innerHTML = h;
}

async function doGen() {
  const urls = D.urls.filter(function(u){return u.trim();});
  if (!urls.length && !D.prompt) { toast('Ajoute une URL ou des instructions','e'); return; }
  if (!D.url) { toast('Configure l\'API dans Paramètres','e'); go('settings'); return; }
  
  const btn = document.getElementById('genBtn');
  btn.disabled = true; btn.textContent = 'Génération…';
  document.getElementById('genprog').style.display = 'block';
  setStep(0);
  
  try {
    await new Promise(function(r){setTimeout(r,300);}); setStep(1);
    await new Promise(function(r){setTimeout(r,400);}); setStep(2);
    
    const res = await api('/api/generate','POST',{
      urls: urls.length ? urls : undefined,
      sector: 'general',
      options: D.opts,
      prompt: D.prompt,
      domain: D.domain,
      extra_images: D.photos
    });
    
    setStep(3); await new Promise(function(r){setTimeout(r,300);}); setStep(4);
    
    const site = {
      id: res.site_id,
      business_name: (res.business_data&&res.business_data.business_name)||'Nouveau site',
      sector: (res.business_data&&res.business_data.sector)||'général',
      urls: urls,
      domain: D.domain,
      options: D.opts.slice(),
      business_data: res.business_data,
      html: res.html,
      created_at: new Date().toISOString(),
      status: 'draft',
      price_once: D.pricing.one,
      price_mo: D.pricing.mo,
    };
    D.sites.unshift(site);
    sv();
    
    toast('Site "' + site.business_name + '" généré !','s');
    D.urls = ['']; D.opts = []; D.prompt = ''; D.domain = ''; D.photos = [];
    go('edit', site.id);
    
  } catch(err) {
    toast('Erreur : ' + err.message, 'e');
    btn.disabled = false; btn.textContent = '⚡ Générer avec Claude';
    document.getElementById('genprog').style.display = 'none';
  }
}

async function doScrape() {
  const urls = D.urls.filter(function(u){return u.trim();});
  if (!urls.length) { toast('Ajoute une URL','e'); return; }
  try {
    toast('Scraping…','i');
    const r = await api('/api/scrape','POST',{urls:urls});
    mo('Données extraites',
      '<pre style="font-size:11px;color:var(--text2);background:var(--bg3);padding:12px;border-radius:8px;overflow:auto;max-height:400px;border:1px solid var(--border)">' + JSON.stringify(r.data,null,2) + '</pre>',
      '<button class="btn bg" onclick="closeMo()">Fermer</button>'
    );
  } catch(err) { toast('Erreur: '+err.message,'e'); }
}

// PREVIEW - uses iframe in modal
function prev(id) {
  const s = D.sites.find(function(x){return x.id===id;});
  if (!s || !s.html) { toast('Pas de HTML pour ce site','e'); return; }
  
  mo('👁 ' + (s.business_name||'Aperçu'),
    '<div style="width:100%;height:74vh;border-radius:8px;overflow:hidden;border:1px solid var(--border)"><iframe id="pvf" style="width:100%;height:100%;border:none" sandbox="allow-scripts allow-same-origin"></iframe></div>',

  );
  
  setTimeout(function() {
    const f = document.getElementById('pvf');
    if (f) {
      f.contentDocument.open();
      f.contentDocument.write(s.html);

    }

function dl(id, name) {
  const s = D.sites.find(function(x){return x.id===id;});
  if (!s||!s.html) return;
  const b = new Blob([s.html],{type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = (name||'site').replace(/[^a-z0-9]/gi,'-').toLowerCase() + '.html';
  a.click();
  toast('HTML téléchargé','s');
}

function delSite(id) {
  if (!confirm('Supprimer ce site ?')) return;
  D.sites = D.sites.filter(function(s){return s.id!==id;});
  sv(); toast('Supprimé','s');
  if (document.getElementById('nav-sites').classList.contains('active')) pSites();
  else pGenerate();

function addChatMsg(text, type) {
  const msgs = document.getElementById('cms');
  if (!msgs) return null;
  const div = document.createElement('div');
  div.className = 'cm ' + type;
  div.innerHTML = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function sendChat(id) {
  const input = document.getElementById('ci');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  const s = D.sites.find(function(x){return x.id===id;});
  if (!s) return;
  addChatMsg(msg, 'u');
  const loading = addChatMsg('Modification en cours…', 'a');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-api-key':D.key,'anthropic-version':'2023-06-01'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 16000,
        system: 'Tu modifies du HTML existant selon les instructions. Retourne UNIQUEMENT le HTML complet modifié, sans markdown ni backticks.',
        messages: [{role:'user',content:'HTML actuel:\n\n'+s.html+'\n\nInstruction: '+msg+'\n\nRetourne le HTML complet modifié.'}]
      })
    });
    const data = await res.json();
    const newHtml = data.content&&data.content[0]&&data.content[0].text||'';
    if (newHtml.includes('<!DOCTYPE')||newHtml.includes('<html')) {
      s.html = newHtml; sv();
      if (loading) loading.innerHTML = '✅ Modifié ! Clique Aperçu pour voir.';
      toast('Site modifié','s');
    } else {
      if (loading) loading.innerHTML = 'Modification appliquée.';
    }
  } catch(err) {
    if (loading) loading.innerHTML = 'Erreur: '+err.message;
  }
}

  h += '<div><div style="font-size:10px;color:var(--text3)">5 sites/mois</div><div id="sr1" style="font-size:15px;font-weight:600;color:var(--accent);margin-top:3px">'+fm(5*D.pricing.one)+'</div></div>';
  h += '<div><div style="font-size:10px;color:var(--text3)">10 abos actifs</div><div id="sr2" style="font-size:15px;font-weight:600;color:var(--success);margin-top:3px">'+fm(10*D.pricing.mo)+'</div></div>';
  h += '<div><div style="font-size:10px;color:var(--text3)">Total estimé/mois</div><div id="sr3" style="font-size:15px;font-weight:600;margin-top:3px">'+fm(5*D.pricing.one+10*D.pricing.mo)+'</div></div>';
  h += '</div>';
  h += '<button class="btn bp sm" style="margin-top:12px" onclick="savePricing()">Sauvegarder</button>';
  h += '</div>';
  
  h += '<div class="card">';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
  h += '<div class="ft" style="margin-bottom:0">Historique ventes</div>';
  h += '<button class="btn bg sm" onclick="addSale()">+ Ajouter</button></div>';
  
  if (D.sales.length === 0) {
    h += '<div class="empty"><div class="empty-i">💰</div><h4>Aucune vente</h4><p>Génère un site et marque-le vendu</p></div>';
  } else {
    h += '<div class="slist">';
    D.sales.forEach(function(s) {
      h += '<div class="srow">';
      h += '<div class="sn">'+(s.client||'Client')+'</div>';
      h += '<span class="styp '+(s.type==='abo'?'ta':'to')+'">'+(s.type==='abo'?'Abonnement':'One-shot')+'</span>';
      h += '<span style="font-weight:600;color:var(--success)">'+fm(s.amount)+'</span>';
      h += '<span style="color:var(--text3);font-size:11px">'+fd(s.date)+'</span>';
      h += '<button class="btn bd ic sm" onclick="delSale(\''+s.id+'\')">✕</button>';
      h += '</div>';
    });
    h += '</div>';
  }
  h += '</div>';
  document.getElementById('pg').innerHTML = h;
}

function updSim() {
  const p1 = parseFloat(document.getElementById('p1')&&document.getElementById('p1').value)||D.pricing.one;
  const p2 = parseFloat(document.getElementById('p2')&&document.getElementById('p2').value)||D.pricing.mo;
  if (document.getElementById('sr1')) document.getElementById('sr1').textContent = fm(5*p1);
  if (document.getElementById('sr2')) document.getElementById('sr2').textContent = fm(10*p2);
  if (document.getElementById('sr3')) document.getElementById('sr3').textContent = fm(5*p1+10*p2);
}

function savePricing() {
  D.pricing.one = parseFloat(document.getElementById('p1').value)||199;
  D.pricing.mo = parseFloat(document.getElementById('p2').value)||29;
  sv(); toast('Tarifs sauvegardés','s');
}

function delSale(id) {
  if (!confirm('Supprimer ?')) return;
  D.sales = D.sales.filter(function(s){return s.id!==id;});
  sv(); pFinance();
}

function addSale() {
  mo('Ajouter une vente',
    '<div style="display:flex;flex-direction:column;gap:10px">'+
    '<div><label>Client</label><input type="text" id="ac" placeholder="Nom du client"></div>'+
    '<div><label>Type</label><select id="at"><option value="oneshot">One-shot</option><option value="abo">Abonnement</option></select></div>'+
    '<div><label>Montant (€)</label><input type="number" id="aa" value="'+D.pricing.one+'"></div>'+
    '</div>',
    '<button class="btn bg" onclick="closeMo()">Annuler</button><button class="btn bo" onclick="confAddSale()">Ajouter</button>'
  );
}

function confAddSale() {
  const client = document.getElementById('ac').value||'Client';
  const type = document.getElementById('at').value;
  const amount = parseFloat(document.getElementById('aa').value)||0;
  D.sales.unshift({id:Date.now().toString(),client:client,type:type,amount:amount,date:new Date().toISOString()});
  sv(); closeMo(); toast(fm(amount)+' ajoutée','s'); pFinance();
}

// PAGE SETTINGS
function pSettings() {
  document.getElementById('pg').innerHTML =
    '<div class="card" style="max-width:480px">'+
    '<div class="ft">Connexion API</div>'+
    '<div style="margin-bottom:12px"><label>URL du serveur Cloud Run</label><input type="url" id="su" value="'+esc(D.url)+'" placeholder="https://sitegen-api-xxx.europe-west1.run.app"></div>'+
    '<div style="margin-bottom:12px"><label>Clé API</label><div style="display:flex;gap:7px"><input type="password" id="sk" value="'+esc(D.key)+'" placeholder="sitegen-alex-2024"><button class="btn bg sm" onclick="const f=document.getElementById(\'sk\');f.type=f.type===\'password\'?\'text\':\'password\'">👁</button></div></div>'+
    '<div style="display:flex;gap:7px"><button class="btn bp sm" onclick="saveCfg()">Sauvegarder</button><button class="btn bg sm" onclick="testConn()">Tester</button></div>'+
    '<div id="ct" style="margin-top:10px;font-size:13px"></div></div>'+
    '<div class="card" style="max-width:480px;margin-top:14px">'+
    '<div class="ft">Données locales</div>'+
    '<p style="font-size:13px;color:var(--text2);margin-bottom:12px">'+D.sites.length+' site(s) · '+D.sales.length+' vente(s)</p>'+
    '<div style="display:flex;gap:7px"><button class="btn bg sm" onclick="expData()">⬇ Exporter</button><button class="btn bd sm" onclick="clrData()">Tout effacer</button></div></div>';
}

function saveCfg() {
  D.url = document.getElementById('su').value.trim().replace(/\/$/,'');
  D.key = document.getElementById('sk').value.trim();
  localStorage.setItem('sg_url', D.url);
  localStorage.setItem('sg_key', D.key);
  if (D.url) document.getElementById('envb').textContent = '● ' + new URL(D.url||'http://x').hostname;
  toast('Sauvegardé','s');
}

async function testConn() {
  const ct = document.getElementById('ct');
  ct.textContent = 'Test…';
  try {
    const r = await fetch(D.url+'/health');
    const d = await r.json();
    ct.innerHTML = '<span style="color:var(--success)">✓ Connecté — v'+d.version+'</span>';
  } catch(e) {
    ct.innerHTML = '<span style="color:var(--danger)">✕ Inaccessible</span>';
  }
}

function expData() {
  const b = new Blob([JSON.stringify({sites:D.sites,sales:D.sales,pricing:D.pricing},null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = 'sitegen-backup.json';
  a.click();
}

function clrData() {
  if (!confirm('Effacer toutes les données ?')) return;
  D.sites = []; D.sales = [];
  localStorage.removeItem('sg_sites');
  localStorage.removeItem('sg_sales');
  sv(); toast('Effacé','s'); pSettings();
}

// INIT
if (D.url) {
  try { document.getElementById('envb').textContent = '● ' + new URL(D.url).hostname; } catch(e) {}
}
go('generate');
</script>
</body>
</html>
