<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteGen Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0F;--bg2:#111118;--bg3:#1A1A24;--bg4:#22222E;
  --border:#2A2A38;--border2:#353548;
  --text:#F0F0F8;--text2:#9090A8;--text3:#5A5A72;
  --accent:#7C6FED;--accent2:#5A4FC5;--accent-glow:rgba(124,111,237,0.15);
  --success:#2ECC8A;--warning:#F0A030;--danger:#E05060;
  --beaute:#E8729A;--plomberie:#4A9EE8;--coach:#F0A030;--restaurant:#2ECC8A;
  --radius:10px;--radius-lg:16px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:24px}
.logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-name{font-weight:600;font-size:15px;color:var(--text)}
.logo-tag{font-size:11px;color:var(--text3);margin-top:1px}
.nav{flex:1;padding:12px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--text2);transition:all .15s;margin-bottom:2px;font-size:13px}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-glow);color:var(--accent);font-weight:500}
.nav-item svg{width:18px;height:18px;opacity:.7;flex-shrink:0}
.nav-item.active svg{opacity:1}
.nav-section{font-size:11px;color:var(--text3);padding:16px 12px 6px;letter-spacing:.06em;text-transform:uppercase}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border)}
.api-key-mini{padding:10px 12px;background:var(--bg3);border-radius:8px;font-size:12px;color:var(--text3)}
.topbar-title{font-weight:600;font-size:15px;flex:1}
.topbar-actions{display:flex;gap:8px;align-items:center}
.badge-env{font-size:11px;padding:3px 8px;background:rgba(46,204,138,.1);color:var(--success);border-radius:20px;border:1px solid rgba(46,204,138,.2)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:rgba(224,80,96,.1);color:var(--danger);border:1px solid rgba(224,80,96,.2)}
.btn-danger:hover{background:rgba(224,80,96,.2)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center;border-radius:7px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-label{font-size:12px;color:var(--text3);margin-bottom:8px}
.stat-value{font-size:24px;font-weight:600;color:var(--text)}
.gen-form{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:24px}
.form-title{font-weight:600;font-size:15px;margin-bottom:16px;color:var(--text)}
label{font-size:12px;color:var(--text2);font-weight:500}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--text3)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--bg3)}
.url-list{display:flex;flex-direction:column;gap:8px}
.url-item{display:flex;gap:8px;align-items:center}
.url-item input{flex:1}
.add-url{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--accent);cursor:pointer;padding:6px 0;background:none;border:none;font-family:inherit}
.sector-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.sector-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--bg3);transition:all .15s}
.sector-pill:hover{border-color:var(--border2);color:var(--text)}
.sector-pill.sel-beaute{background:rgba(232,114,154,.1);border-color:rgba(232,114,154,.4);color:var(--beaute)}
.sector-pill.sel-plomberie{background:rgba(74,158,232,.1);border-color:rgba(74,158,232,.4);color:var(--plomberie)}
.sector-pill.sel-coach{background:rgba(240,160,48,.1);border-color:rgba(240,160,48,.4);color:var(--coach)}
.sector-pill.sel-restaurant{background:rgba(46,204,138,.1);border-color:rgba(46,204,138,.4);color:var(--success)}
.sector-pill.sel-autre{background:var(--accent-glow);border-color:rgba(124,111,237,.4);color:var(--accent)}
.progress-bar{height:4px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:12px 0}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .5s ease}
.step-list{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.step-item{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2)}
.step-item.done{color:var(--success)}
.step-item.active{color:var(--text)}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0}
.step-item.done .step-dot{background:var(--success)}
.step-item.active .step-dot{background:var(--accent);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sites-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.sites-header h3{font-size:15px;font-weight:600;flex:1}
.search-wrap{position:relative;flex:1;max-width:280px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);width:14px;height:14px}
.search-wrap input{padding-left:30px}
.sites-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.site-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border .15s;cursor:pointer}
.site-card:hover{border-color:var(--border2)}
.site-preview{height:140px;background:var(--bg3);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.site-preview-mock{width:100%;height:100%;padding:12px;display:flex;flex-direction:column;gap:6px;opacity:.6;pointer-events:none}
.mock-bar{height:6px;border-radius:3px;background:var(--border2)}
.mock-bar.short{width:40%}
.mock-bar.mid{width:65%}
.mock-bar.ac{background:var(--accent);width:30%}
.mock-row{display:flex;gap:6px}
.mock-block{flex:1;height:32px;border-radius:4px;background:var(--border)}
.sector-dot{position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%}
.site-info{padding:14px}
.site-name{font-weight:600;font-size:14px;margin-bottom:4px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.site-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3)}
.site-sector{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.sect-beaute{background:rgba(232,114,154,.1);color:var(--beaute)}
.sect-plomberie{background:rgba(74,158,232,.1);color:var(--plomberie)}
.sect-coach{background:rgba(240,160,48,.1);color:var(--coach)}
.sect-restaurant{background:rgba(46,204,138,.1);color:var(--success)}
.sect-autre{background:var(--accent-glow);color:var(--accent)}
.site-actions{display:flex;gap:6px;margin-top:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);width:90%;max-width:580px;max-height:90vh;display:flex;flex-direction:column}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-weight:600;font-size:15px}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.json-viewer{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px;font-size:12px;font-family:monospace;color:var(--text2);overflow-x:auto;white-space:pre-wrap;max-height:300px;overflow-y:auto}
.jk{color:#7FB3F0}.js{color:#98D482}.jn{color:#F0A030}.jb{color:#E879A8}
.toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:200}
.toast{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;animation:slideIn .25s ease;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast-success{background:rgba(46,204,138,.15);border:1px solid rgba(46,204,138,.3);color:var(--success)}
.toast-error{background:rgba(224,80,96,.15);border:1px solid rgba(224,80,96,.3);color:var(--danger)}
.toast-info{background:var(--accent-glow);border:1px solid rgba(124,111,237,.3);color:var(--accent)}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.settings-section{margin-bottom:24px}
.settings-label{font-size:13px;font-weight:500;margin-bottom:8px;color:var(--text2)}
.api-key-display{display:flex;gap:8px;align-items:center}
.api-key-display input{flex:1;font-family:monospace;font-size:12px}
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.empty h4{font-size:15px;color:var(--text2);margin-bottom:6px}
.empty p{font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
@media(max-width:768px){.sidebar{display:none}.stat-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">
        <div class="logo-icon">⚡</div>
        <div><div class="logo-name">SiteGen</div><div class="logo-tag">Site builder API</div></div>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-section">Menu</div>
      <div class="nav-item active" onclick="showPage('generate')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Générer un site
      </div>
      <div class="nav-item" onclick="showPage('sites')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Sites générés
      </div>
      <div class="nav-item" onclick="showPage('scrape')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Scraper une source
      </div>
      <div class="nav-section">Compte</div>
      <div class="nav-item" onclick="showPage('settings')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>Paramètres
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="api-key-mini">API <span id="apiStatusDot" style="color:var(--success);font-weight:500">● connecté</span></div>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">Générer un site</div>
      <div class="topbar-actions">
        <div class="badge-env" id="envBadge">● local</div>
        <button class="btn btn-ghost btn-sm" onclick="showPage('settings')">Config</button>
      </div>
    </div>
    <div class="content" id="pageContent"></div>
  </div>
</div>
<div class="toast-wrap" id="toastWrap"></div>
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Détails</div>
      <button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>
<script>
const S={apiUrl:localStorage.getItem('sg_apiUrl')||'',apiKey:localStorage.getItem('sg_apiKey')||'',sites:JSON.parse(localStorage.getItem('sg_sites')||'[]'),generating:false,page:'generate',urls:[''],sector:'beaute'};

function toast(msg,type='info'){const t=document.createElement('div');t.className='toast toast-'+type;t.innerHTML='<span>'+(type==='success'?'✓':type==='error'?'✕':'ℹ')+'</span> '+msg;document.getElementById('toastWrap').appendChild(t);setTimeout(()=>t.remove(),3500)}
function openModal(title,body,footer){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=body;document.getElementById('modalFooter').innerHTML=footer||'';document.getElementById('modalOverlay').style.display='flex'}
function closeModal(){document.getElementById('modalOverlay').style.display='none'}
function fmtDate(iso){if(!iso)return'—';const d=new Date(iso);return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}
function slabel(s){return{beaute:'Institut beauté',plomberie:'Plombier',coach:'Coach',restaurant:'Restaurant',autre:'Autre'}[s]||s}
function scol(s){return{beaute:'var(--beaute)',plomberie:'var(--plomberie)',coach:'var(--coach)',restaurant:'var(--success)',autre:'var(--accent)'}[s]||'var(--accent)'}
function hjson(json){return JSON.stringify(json,null,2).replace(/(".*?"):/g,'<span class="jk">$1</span>:').replace(/: (".*?")/g,': <span class="js">$1</span>').replace(/: (\d+\.?\d*)/g,': <span class="jn">$1</span>').replace(/: (true|false|null)/g,': <span class="jb">$1</span>')}
async function api(endpoint,method,body){if(!S.apiKey){toast('Configure ta clé API dans Paramètres','error');throw new Error('no key')}const r=await fetch(S.apiUrl+endpoint,{method:method||'GET',headers:{'Content-Type':'application/json','X-Api-Key':S.apiKey},body:body?JSON.stringify(body):undefined});const d=await r.json();if(!r.ok)throw new Error(d.error||'Erreur');return d}

const titles={generate:'Générer un site',sites:'Sites générés',scrape:'Scraper une source',settings:'Paramètres'};
function showPage(p){S.page=p;document.getElementById('topbarTitle').textContent=titles[p];document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));document.querySelectorAll('.nav-item').forEach(el=>{if(el.getAttribute('onclick')?.includes("'"+p+"'"))el.classList.add('active')});({generate:renderGenerate,sites:renderSites,scrape:renderScrape,settings:renderSettings})[p]?.()}

function renderGenerate(){
  const wk=S.sites.filter(s=>new Date(s.created_at)>new Date(Date.now()-7*86400000)).length;
  document.getElementById('pageContent').innerHTML=
    '<div class="stat-grid">'+
    '<div class="stat-card"><div class="stat-label">Sites générés</div><div class="stat-value">'+S.sites.length+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Cette semaine</div><div class="stat-value">'+wk+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Beauté</div><div class="stat-value">'+S.sites.filter(s=>s.sector==='beaute').length+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Plomberie</div><div class="stat-value">'+S.sites.filter(s=>s.sector==='plomberie').length+'</div></div>'+
    '</div>'+
    '<div class="gen-form">'+
    '<div class="form-title">Nouveau site</div>'+
    '<div style="margin-bottom:14px"><label style="display:block;margin-bottom:8px">Secteur</label>'+
    '<div class="sector-pills">'+['beaute','plomberie','coach','restaurant','autre'].map(s=>'<div class="sector-pill'+(s===S.sector?' sel-'+s:'')+'" onclick="setSector(\''+s+'\')">'+slabel(s)+'</div>').join('')+'</div></div>'+
    '<div style="margin-bottom:14px"><label style="display:block;margin-bottom:8px">URLs sources <span style="color:var(--text3);font-weight:400">(Instagram, TikTok, site, Google Maps…)</span></label>'+
    '<div class="url-list" id="urlList">'+S.urls.map((u,i)=>'<div class="url-item"><input type="url" placeholder="https://instagram.com/mon_client" value="'+u+'" oninput="updUrl('+i+',this.value)">'+(i>0?'<button class="btn btn-ghost btn-icon btn-sm" onclick="rmUrl('+i+')">✕</button>':'')+'</div>').join('')+'</div>'+
    '<button class="add-url" onclick="addUrl()">+ Ajouter une URL</button></div>'+
    '<div style="display:flex;gap:12px;align-items:center;margin-top:16px">'+
    '<button class="btn btn-primary" id="genBtn" onclick="doGenerate()">⚡ Générer le site</button>'+
    '<button class="btn btn-ghost" onclick="doScrapeOnly()">Scraper uniquement</button></div>'+
    '<div id="genProgress" style="display:none;margin-top:16px">'+
    '<div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0%"></div></div>'+
    '<div class="step-list" id="stepList"></div></div></div>'+
    (S.sites.length>0?'<div><div class="sites-header"><h3>Derniers sites</h3><button class="btn btn-ghost btn-sm" onclick="showPage(\'sites\')">Voir tout →</button></div><div class="sites-grid">'+S.sites.slice(0,3).map(siteCard).join('')+'</div></div>':'')
}

function setSector(s){S.sector=s;document.querySelectorAll('.sector-pill').forEach((el,i)=>{const ss=['beaute','plomberie','coach','restaurant','autre'];el.className='sector-pill'+(ss[i]===s?' sel-'+ss[i]:'')});
}
function addUrl(){if(S.urls.length>=5){toast('Maximum 5 URLs','error');return}S.urls.push('');renderGenerate()}
function rmUrl(i){S.urls.splice(i,1);renderGenerate()}
function updUrl(i,v){S.urls[i]=v}

const steps=['Connexion à l\'API…','Scraping des sources…','Extraction des données…','Génération avec Claude…','Sauvegarde…'];
function setStep(n){document.getElementById('pFill').style.width=Math.round(n/steps.length*100)+'%';document.getElementById('stepList').innerHTML=steps.map((s,i)=>'<div class="step-item'+(i<n?' done':i===n?' active':'')+'"><div class="step-dot"></div>'+s+(i<n?' ✓':'')+'</div>').join('')}

async function doGenerate(){
  const urls=S.urls.filter(u=>u.trim());
  if(!urls.length){toast('Ajoute au moins une URL','error');return}
  if(!S.apiUrl){toast('Configure l\'URL de l\'API dans Paramètres','error');showPage('settings');return}
  S.generating=true;
  const btn=document.getElementById('genBtn');btn.disabled=true;btn.textContent='Génération…';
  document.getElementById('genProgress').style.display='block';
  setStep(0);
  try{
    await new Promise(r=>setTimeout(r,400));setStep(1);
    await new Promise(r=>setTimeout(r,500));setStep(2);
    const res=await api('/api/generate','POST',{urls,sector:S.sector});
    setStep(3);await new Promise(r=>setTimeout(r,400));setStep(4);
    const site={id:res.site_id,business_name:res.business_data?.business_name||'Nouveau site',sector:S.sector,urls,business_data:res.business_data,html:res.html,created_at:new Date().toISOString()};
    S.sites.unshift(site);localStorage.setItem('sg_sites',JSON.stringify(S.sites));
    await new Promise(r=>setTimeout(r,400));
    toast('Site "'+site.business_name+'" généré !','success');
    S.generating=false;S.urls=[''];renderGenerate();showDetail(site);
  }catch(err){
    toast('Erreur : '+err.message,'error');S.generating=false;
    if(document.getElementById('genBtn')){document.getElementById('genBtn').disabled=false;document.getElementById('genBtn').textContent='⚡ Générer le site';document.getElementById('genProgress').style.display='none'}
  }
}

async function doScrapeOnly(){
  const urls=S.urls.filter(u=>u.trim());
  if(!urls.length){toast('Ajoute au moins une URL','error');return}
  try{toast('Scraping…','info');const res=await api('/api/scrape','POST',{urls});openModal('Données extraites','<p style="font-size:13px;color:var(--text2);margin-bottom:12px">'+(res.cached?'⚡ Cache':'Données fraîches')+'</p><div class="json-viewer">'+hjson(res.data)+'</div>','<button class="btn btn-ghost" onclick="closeModal()">Fermer</button>')}
  catch(err){toast('Erreur: '+err.message,'error')}
}

function siteCard(site){
  return '<div class="site-card" onclick="showDetail(this._s)" data-id="'+site.id+'">'+
    '<div class="site-preview"><div class="site-preview-mock">'+
    '<div class="mock-bar ac"></div><div class="mock-bar mid"></div><div class="mock-bar short"></div>'+
    '<div style="height:8px"></div><div class="mock-row"><div class="mock-block"></div><div class="mock-block"></div></div>'+
    '<div style="height:4px"></div><div class="mock-bar mid"></div><div class="mock-bar short"></div></div>'+
    '<div class="sector-dot" style="background:'+scol(site.sector)+'"></div></div>'+
    '<div class="site-info">'+
    '<div class="site-name">'+(site.business_name||'Sans nom')+'</div>'+
    '<div class="site-meta"><span class="site-sector sect-'+site.sector+'">'+slabel(site.sector)+'</span><span>'+fmtDate(site.created_at)+'</span></div>'+
    '<div class="site-actions" onclick="event.stopPropagation()">'+
    '<button class="btn btn-ghost btn-sm" onclick="prevSite(\''+site.id+'\')">👁 Aperçu</button>'+
    '<button class="btn btn-ghost btn-sm" onclick="dlSite(\''+site.id+'\',\''+esc(site.business_name||'site')+'\')">⬇ HTML</button>'+
    '<button class="btn btn-danger btn-sm" onclick="delSite(\''+site.id+'\')">✕</button>'+
    '</div></div></div>'
}

function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;')}

function showDetail(site){
  if(typeof site==='string')site=S.sites.find(s=>s.id===site);
  if(!site)return;
  const bd=site.business_data||{};
  openModal(site.business_name||'Détails',
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">'+
    '<div class="stat-card"><div class="stat-label">Secteur</div><div class="site-sector sect-'+site.sector+'" style="margin-top:4px;display:inline-block">'+slabel(site.sector)+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Généré le</div><div style="font-size:13px;margin-top:4px">'+fmtDate(site.created_at)+'</div></div></div>'+
    (bd.contact?'<div style="margin-bottom:16px"><div class="settings-label">Contact extrait</div><div style="font-size:13px;color:var(--text2);display:flex;flex-direction:column;gap:4px">'+
    (bd.contact.phone?'<div>📞 '+bd.contact.phone+'</div>':'')+
    (bd.contact.address?'<div>📍 '+bd.contact.address+'</div>':'')+
    (bd.contact.instagram?'<div>📸 '+bd.contact.instagram+'</div>':'')+
    '</div></div>':'')+
    (bd.services?.length?'<div style="margin-bottom:16px"><div class="settings-label">Services ('+bd.services.length+')</div>'+bd.services.map(s=>'<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border)"><span>'+s.name+'</span><span style="color:var(--accent)">'+(s.price||'—')+'</span></div>').join('')+'</div>':'')+
    '<div class="settings-label">ID</div><div style="font-family:monospace;font-size:11px;color:var(--text3)">'+site.id+'</div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Fermer</button>'+
    '<button class="btn btn-ghost" onclick="prevSite(\''+site.id+'\')">👁 Aperçu</button>'+
    '<button class="btn btn-primary" onclick="dlSite(\''+site.id+'\',\''+esc(site.business_name||'site')+'\')">⬇ Télécharger</button>'
  );
}

function renderSites(){
  document.getElementById('pageContent').innerHTML=
    '<div class="sites-header">'+
    '<h3>'+S.sites.length+' site'+(S.sites.length>1?'s':'')+'</h3>'+
    '<div class="search-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="search" placeholder="Rechercher…" oninput="filterS(this.value)"></div>'+
    '<div style="display:flex;gap:6px">'+['Tous','beaute','plomberie','coach','restaurant'].map(s=>'<button class="btn btn-ghost btn-sm" onclick="filterSect(\''+s+'\')">'+( s==='Tous'?'Tous':slabel(s))+'</button>').join('')+'</div>'+
    '</div>'+
    '<div class="sites-grid" id="sitesGrid">'+
    (S.sites.length?S.sites.map(siteCard).join(''):'<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🌐</div><h4>Aucun site généré</h4><p>Lance ta première génération</p></div>')+
    '</div>'
}

function filterS(q){const f=S.sites.filter(s=>(s.business_name||'').toLowerCase().includes(q.toLowerCase())||s.sector.includes(q));const g=document.getElementById('sitesGrid');if(g)g.innerHTML=f.map(siteCard).join('')||'<div class="empty" style="grid-column:1/-1"><p>Aucun résultat</p></div>'}
function filterSect(s){const f=s==='Tous'?S.sites:S.sites.filter(x=>x.sector===s);const g=document.getElementById('sitesGrid');if(g)g.innerHTML=f.map(siteCard).join('')||'<div class="empty" style="grid-column:1/-1"><p>Aucun site dans ce secteur</p></div>'}

function prevSite(id){const s=S.sites.find(x=>x.id===id);if(!s)return;if(s.html){const b=new Blob([s.html],{type:'text/html'});window.open(URL.createObjectURL(b),'_blank')}else{window.open(S.apiUrl+'/api/sites/'+id+'/preview','_blank')}toast('Aperçu ouvert','info')}
function dlSite(id,name){const s=S.sites.find(x=>x.id===id);if(s?.html){const b=new Blob([s.html],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name.replace(/[^a-z0-9]/gi,'-').toLowerCase()+'.html';a.click();toast('HTML téléchargé','success')}else{window.open(S.apiUrl+'/api/sites/'+id+'/export','_blank')}}
function delSite(id){if(!confirm('Supprimer ce site ?'))return;S.sites=S.sites.filter(s=>s.id!==id);localStorage.setItem('sg_sites',JSON.stringify(S.sites));toast('Supprimé','success');if(S.page==='sites')renderSites();else renderGenerate()}

function renderScrape(){
  document.getElementById('pageContent').innerHTML=
    '<div class="card" style="max-width:620px">'+
    '<div class="form-title">Scraper une source</div>'+
    '<p style="font-size:13px;color:var(--text2);margin-bottom:20px">Extrait les données d\'un business sans générer de site.</p>'+
    '<label style="display:block;margin-bottom:8px">URLs (max 5)</label>'+
    '<div class="url-list" id="scrUrlList"><div class="url-item"><input type="url" id="su0" placeholder="https://instagram.com/..."></div></div>'+
    '<button class="add-url" onclick="addScrUrl()">+ Ajouter une URL</button>'+
    '<div style="margin-top:16px"><button class="btn btn-primary" onclick="doScrape()">🔍 Scraper</button></div>'+
    '<div id="scrRes" style="margin-top:20px"></div></div>';
  window._scrN=1;
}
function addScrUrl(){if(window._scrN>=5)return;const l=document.getElementById('scrUrlList');const d=document.createElement('div');d.className='url-item';d.innerHTML='<input type="url" id="su'+window._scrN+'" placeholder="https://..."><button class="btn btn-ghost btn-icon btn-sm" onclick="this.parentElement.remove()">✕</button>';l.appendChild(d);window._scrN++}
async function doScrape(){const urls=Array.from(document.querySelectorAll('[id^=su]')).map(i=>i.value.trim()).filter(Boolean);if(!urls.length){toast('Ajoute une URL','error');return}const res=document.getElementById('scrRes');res.innerHTML='<p style="color:var(--text3);font-size:13px">Scraping…</p>';try{const r=await api('/api/scrape','POST',{urls});res.innerHTML='<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px"><span style="color:var(--success);font-size:13px;font-weight:500">✓ Données extraites</span>'+(r.cached?'<span style="font-size:11px;color:var(--text3)">(cache)</span>':'')+'</div><div class="json-viewer">'+hjson(r.data)+'</div><div style="margin-top:12px"><button class="btn btn-ghost btn-sm" onclick="navigator.clipboard.writeText(JSON.stringify(window._scrData));toast(\'Copié\',\'success\')">Copier JSON</button></div>';window._scrData=r.data;toast('Scraping terminé','success')}catch(err){res.innerHTML='<p style="color:var(--danger);font-size:13px">Erreur : '+err.message+'</p>'}}

function renderSettings(){
  document.getElementById('pageContent').innerHTML=
    '<div class="card" style="max-width:520px">'+
    '<div class="form-title">Connexion API</div>'+
    '<div class="settings-section"><div class="settings-label">URL du serveur</div><input type="url" id="sUrl" value="'+S.apiUrl+'" placeholder="https://ton-domaine.o2switch.net"></div>'+
    '<div class="settings-section"><div class="settings-label">Clé API (X-Api-Key)</div><div class="api-key-display"><input type="password" id="sKey" value="'+S.apiKey+'" placeholder="ta-cle-api-secrete"><button class="btn btn-ghost btn-sm" onclick="const f=document.getElementById(\'sKey\');f.type=f.type===\'password\'?\'text\':\'password\'">👁</button></div></div>'+
    '<div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="saveSet()">Sauvegarder</button><button class="btn btn-ghost" onclick="testConn()">Tester</button></div>'+
    '<div id="connTest" style="margin-top:12px;font-size:13px"></div></div>'+
    '<div class="card" style="max-width:520px;margin-top:16px">'+
    '<div class="form-title">Données locales</div>'+
    '<p style="font-size:13px;color:var(--text2);margin-bottom:16px">'+S.sites.length+' site(s) en local.</p>'+
    '<div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" onclick="expData()">⬇ Exporter</button><button class="btn btn-danger btn-sm" onclick="clrData()">Tout effacer</button></div></div>'+
    '<div class="card" style="max-width:520px;margin-top:16px">'+
    '<div class="form-title">Déploiement o2switch</div>'+
    '<code style="background:var(--bg3);padding:12px;border-radius:8px;display:block;font-size:12px;line-height:1.9;border:1px solid var(--border);color:var(--text2)">'+
    '1. ssh user@ton-serveur.o2switch.net<br>2. cd sitegen-api && npm install<br>3. cp .env.example .env && nano .env<br>4. pm2 start src/index.js --name sitegen-api<br>5. Renseigner URL + clé API ci-dessus</code></div>'
}
function saveSet(){S.apiUrl=document.getElementById('sUrl').value.trim().replace(/\/$/,'');S.apiKey=document.getElementById('sKey').value.trim();localStorage.setItem('sg_apiUrl',S.apiUrl);localStorage.setItem('sg_apiKey',S.apiKey);document.getElementById('envBadge').textContent='● '+(S.apiUrl?new URL(S.apiUrl||'http://localhost').hostname:'local');toast('Sauvegardé','success')}
async function testConn(){const ct=document.getElementById('connTest');ct.textContent='Test…';ct.style.color='var(--text3)';try{const r=await fetch(S.apiUrl+'/health');const d=await r.json();ct.innerHTML='<span style="color:var(--success)">✓ Connecté — v'+d.version+'</span>'}catch{ct.innerHTML='<span style="color:var(--danger)">✕ Serveur inaccessible</span>'}}
function expData(){const b=new Blob([JSON.stringify(S.sites,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='sitegen-backup.json';a.click()}
function clrData(){if(!confirm('Effacer '+S.sites.length+' sites locaux ?'))return;S.sites=[];localStorage.removeItem('sg_sites');toast('Effacé','success');renderSettings()}

// init
showPage('generate');
</script>
</body>
</html>
